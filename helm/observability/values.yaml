# ── kube-prometheus-stack ───────────────────────────────────────────────────
# fullnameOverride gives a predictable Prometheus service name used by the
# OTel gateway config below. The Prometheus service becomes "prometheus-operated"
# (managed by the Prometheus Operator) and is queried at port 9090.
kube-prometheus-stack:
  fullnameOverride: prometheus

  alertmanager:
    enabled: false

  # Pin all kube-prometheus-stack components to the server node
  prometheusOperator:
    nodeSelector:
      role: monitor
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 128Mi
        cpu: 200m

  prometheus:
    prometheusSpec:
      nodeSelector:
        role: monitor
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 512Mi
          cpu: 500m
      retention: 30d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            resources:
              requests:
                storage: 20Gi
      # Accept remote-write from OTel gateway
      enableRemoteWriteReceiver: true

  grafana:
    enabled: true
    nodeSelector:
      role: monitor
    resources:
      requests:
        memory: 256Mi
        cpu: 50m
      limits:
        memory: 512Mi
        cpu: 200m

    # Admin password — override in values.secret.yaml
    adminPassword: ""

    persistence:
      enabled: true
      storageClassName: local-path
      size: 2Gi

    # SMTP for alert emails (optional — configure in values.secret.yaml)
    smtp:
      enabled: false

    # Sidecar loads ConfigMaps labelled grafana_dashboard: "1" as dashboards
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL

    # Loki and Tempo as additional datasources
    additionalDataSources:
      - name: Loki
        type: loki
        uid: loki
        url: http://loki:3100
        access: proxy
        isDefault: false
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo:3200
        access: proxy
        isDefault: false

    ingress:
      enabled: true
      ingressClassName: traefik
      # Grafana subdomain — set in values.secret.yaml (e.g. grafana.example.com)
      hosts: []

  kube-state-metrics:
    nodeSelector:
      role: monitor
    resources:
      requests:
        memory: 32Mi
        cpu: 20m
      limits:
        memory: 128Mi
        cpu: 100m

  prometheus-node-exporter:
    # DaemonSet — no nodeSelector needed
    resources:
      requests:
        memory: 32Mi
        cpu: 20m
      limits:
        memory: 64Mi
        cpu: 100m

# ── Loki ─────────────────────────────────────────────────────────────────────
loki:
  fullnameOverride: loki

  deploymentMode: SingleBinary

  singleBinary:
    replicas: 1
    nodeSelector:
      role: monitor
    resources:
      requests:
        memory: 256Mi
        cpu: 50m
      limits:
        memory: 512Mi
        cpu: 200m

  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

  persistence:
    enabled: true
    storageClass: local-path
    size: 10Gi

  # Disable components not needed in single-binary mode
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

  # Disable optional components that add overhead without benefit in this setup:
  # - gateway: Grafana connects to loki:3100 directly
  # - lokiCanary: validation DaemonSet, unnecessary in production
  # - resultsCache: Memcached query cache, not needed at this scale
  # - test: chart validation requires canary; disable both together
  gateway:
    enabled: false
  lokiCanary:
    enabled: false
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  test:
    enabled: false

# ── Tempo ─────────────────────────────────────────────────────────────────────
tempo:
  fullnameOverride: tempo

  replicas: 1

  nodeSelector:
    role: monitor

  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

  tempo:
    retention: 48h
    metricsGenerator:
      enabled: true
      remoteWriteUrl: "http://prometheus-operated:9090/api/v1/write"
    overrides:
      defaults:
        metrics_generator:
          processors:
            - service-graphs
            - span-metrics

  persistence:
    enabled: true
    storageClassName: local-path
    size: 10Gi

# ── OTel agent (DaemonSet — one per node) ────────────────────────────────────
otel-agent:
  fullnameOverride: otel-agent
  mode: daemonset

  # Limit aligns with memory_limiter (limit_mib: 192)
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.146.1"

  # ClusterRole for k8sattributes processor
  clusterRole:
    create: true
    rules:
      - apiGroups: [""]
        resources: ["pods", "namespaces", "nodes"]
        verbs: ["get", "list", "watch"]
      - apiGroups: ["apps"]
        resources: ["replicasets", "deployments", "statefulsets", "daemonsets"]
        verbs: ["get", "list", "watch"]

  extraEnvs:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName

  # Mount host log paths for filelog receiver
  extraVolumes:
    - name: varlogpods
      hostPath:
        path: /var/log/pods
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers

  extraVolumeMounts:
    - name: varlogpods
      mountPath: /var/log/pods
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true

  config:
    receivers:
      hostmetrics:
        collection_interval: 60s
        scrapers:
          cpu: {}
          disk: {}
          filesystem:
            exclude_mount_points:
              mount_points: [/dev, /sys, /proc, /run/k3s/containerd, /var/lib/kubelet]
              match_type: strict
          load: {}
          memory: {}
          network: {}
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          - type: container

    processors:
      memory_limiter:
        limit_mib: 192
        spike_limit_mib: 48
        check_interval: 5s
      batch:
        timeout: 10s
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        filter:
          node_from_env_var: K8S_NODE_NAME
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
              - from: resource_attribute
                name: k8s.namespace.name
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: connection
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.pod.name
            - k8s.node.name
            - k8s.container.name
      resource/service_name:
        attributes:
          - key: service.name
            from_attribute: k8s.statefulset.name
            action: upsert
          - key: service.name
            from_attribute: k8s.daemonset.name
            action: upsert
          - key: service.name
            from_attribute: k8s.deployment.name
            action: upsert
      transform/service_name_fallback:
        log_statements:
          - context: resource
            statements:
              - >
                set(attributes["service.name"],
                    ExtractPatterns(attributes["k8s.pod.name"],
                        "^(?P<svc>.+?)-[a-z0-9]+-[a-z0-9]+$")["svc"])
                where (attributes["service.name"] == nil
                    or attributes["service.name"] == "unknown_service")
                    and attributes["k8s.pod.name"] != nil
              - >
                set(attributes["service.name"],
                    ExtractPatterns(attributes["k8s.pod.name"],
                        "^(?P<svc>.+?)-[a-z0-9]+$")["svc"])
                where (attributes["service.name"] == nil
                    or attributes["service.name"] == "unknown_service")
                    and attributes["k8s.pod.name"] != nil
      filter/drop_unknown_service:
        error_mode: ignore
        logs:
          log_record:
            - resource.attributes["service.name"] == "unknown_service"
            - resource.attributes["service.name"] == nil

    exporters:
      otlphttp/gateway:
        endpoint: http://otel-gateway:4318

    service:
      pipelines:
        metrics:
          receivers: [hostmetrics]
          processors: [memory_limiter, k8sattributes, batch]
          exporters: [otlphttp/gateway]
        logs:
          receivers: [filelog]
          processors:
            - memory_limiter
            - k8sattributes
            - resource/service_name
            - transform/service_name_fallback
            - filter/drop_unknown_service
            - batch
          exporters: [otlphttp/gateway]

# ── OTel gateway (Deployment — central fan-out) ───────────────────────────────
otel-gateway:
  fullnameOverride: otel-gateway
  mode: deployment

  replicaCount: 1

  nodeSelector:
    role: monitor

  # Limit aligns with memory_limiter (limit_mib: 256)
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 384Mi
      cpu: 300m

  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.146.1"

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      k8s_cluster:
        collection_interval: 60s
        node_conditions_to_report: [Ready, MemoryPressure, DiskPressure]
        allocatable_types_to_report: [cpu, memory]

    processors:
      memory_limiter:
        limit_mib: 256
        spike_limit_mib: 64
        check_interval: 5s
      batch:
        timeout: 10s
      transform/truncate_logs:
        log_statements:
          - context: log
            statements:
              - set(body, Substring(body, 0, 65536)) where IsString(body) and Len(body) > 65536

    exporters:
      # kube-prometheus-stack enables remote-write receiver at port 9090
      prometheusremotewrite:
        endpoint: http://prometheus-operated:9090/api/v1/write
        tls:
          insecure: true
      otlphttp/loki:
        endpoint: http://loki:3100/otlp
        tls:
          insecure: true
      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [otlp, k8s_cluster]
          processors: [memory_limiter, batch]
          exporters: [prometheusremotewrite]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, transform/truncate_logs, batch]
          exporters: [otlphttp/loki]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/tempo]
