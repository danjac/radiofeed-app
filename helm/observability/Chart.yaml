apiVersion: v2
name: observability
description: Radiofeed observability stack (Prometheus, Grafana, Loki, Tempo, OTel)
type: application
version: 0.1.0

dependencies:
  - name: kube-prometheus-stack
    version: "82.4.3"
    repository: "https://prometheus-community.github.io/helm-charts"

  - name: loki
    version: "6.53.0"
    repository: "https://grafana.github.io/helm-charts"

  - name: tempo
    version: "1.24.4"
    repository: "https://grafana.github.io/helm-charts"

  # OTel agent — DaemonSet, collects from each node
  - name: opentelemetry-collector
    version: "0.146.0"
    repository: "https://open-telemetry.github.io/opentelemetry-helm-charts"
    alias: otel-agent

  # OTel gateway — Deployment, receives from agents, fans out to backends
  - name: opentelemetry-collector
    version: "0.146.0"
    repository: "https://open-telemetry.github.io/opentelemetry-helm-charts"
    alias: otel-gateway
