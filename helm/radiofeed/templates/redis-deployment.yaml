apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      nodeSelector:
        role: database
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          resources:
            requests:
              memory: {{ .Values.resources.redis.requests.memory|quote }}
              cpu: {{ .Values.resources.redis.requests.cpu|quote }}
            limits:
              memory: {{ .Values.resources.redis.limits.memory|quote }}
              cpu: {{ .Values.resources.redis.limits.cpu|quote }}
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 1
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 1
            timeoutSeconds: 3
            failureThreshold: 30
