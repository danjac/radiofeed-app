# Application image
image: ghcr.io/danjac/radiofeed-app:main

# Number of webapp replicas — override in values.secret.yaml
replicas: 1

# PostgreSQL configuration
postgres:
  image: postgres:18.1-bookworm
  storage: 30Gi
  # Volume mount path — set in values.secret.yaml from:
  # terraform -chdir=terraform/hetzner output -raw postgres_volume_mount_path
  volumePath: ""
  args:
    - postgres
    - -c
    - lock_timeout=5s
    - -c
    - log_destination=stderr
    - -c
    - log_statement=all
    - -c
    - max_connections=200
    - -c
    - max_wal_size=4GB
    - -c
    - statement_timeout=30s
    - -c
    - wal_buffers=32MB

# Redis configuration
redis:
  image: redis:8.2.2-bookworm

# Resource requests/limits — defaults tuned for cx23 (2 vCPU, 4 GB RAM).
# Override per-workload in values.secret.yaml if using a different server type.
resources:
  app:
    requests:
      memory: 1536Mi
      cpu: 700m
    limits:
      memory: 3072Mi
      cpu: 1600m
  worker:
    requests:
      memory: 1536Mi
      cpu: 700m
    limits:
      memory: 3072Mi
      cpu: 1600m
  cronjob:
    requests:
      memory: 512Mi
      cpu: 200m
    limits:
      memory: 1024Mi
      cpu: 800m
  postgres:
    requests:
      memory: 1024Mi
      cpu: 400m
    limits:
      memory: 2816Mi
      cpu: 1600m
  redis:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

# Application domain — set in values.secret.yaml
domain: ""

# Django application settings
app:
  adminUrl: admin/
  admins: ""
  allowedHosts: "*"
  contactEmail: ""
  connPool:
    maxIdle: 120
    maxLifetime: 1800
    maxWaiting: 25
    maxSize: 100
    minSize: 2
    timeout: 20
  cspScriptWhitelist: "*.account.google.com,*.googleapis.com,*.cloudflareinsights.com"
  mailgunApiUrl: https://api.eu.mailgun.net/v3
  mailgunSenderDomain: ""
  metaAuthor: ""
  metaDescription: ""
  metaKeywords: ""
  secureSslRedirect: false

# CronJob schedules
cronjobs:
  clear-sessions:
    schedule: "20 5 * * *"
    command: "./manage.sh clearsessions"
  prune-db-task-results:
    schedule: "25 9 * * *"
    command: "./manage.sh prune_db_task_results --min-age-days=1"
  create-podcast-recommendations:
    schedule: "20 4 * * *"
    command: "./manage.sh create_podcast_recommendations"
  fetch-itunes-feeds:
    schedule: "15 3 * * *"
    command: "./manage.sh fetch_itunes_feeds"
  parse-podcast-feeds:
    schedule: "*/6 * * * *"
    command: "./manage.sh parse_podcast_feeds"
  send-episode-updates:
    schedule: "0 13 * * 1"
    command: "./manage.sh send_episode_updates"
  send-podcast-recommendations:
    schedule: "0 13 * * 5"
    command: "./manage.sh send_podcast_recommendations"

# PostgreSQL major-version upgrade (disabled by default)
pgUpgrade:
  enabled: false
  newImage: ""
  newVolumePath: ""
  storage: 30Gi

# Secrets — never commit values.secret.yaml
# Copy values.secret.yaml.example to values.secret.yaml and fill in values.
secrets:
  postgresPassword: ""
  djangoSecretKey: ""
  djangoSecretKeyFallbacks: ""
  mailgunApiKey: ""
  sentryUrl: ""
  openTelemetryUrl: ""
  pwaSha256Fingerprints: ""
  cloudflare:
    cert: ""
    key: ""
